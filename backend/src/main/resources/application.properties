spring.application.name=Prueba Oscar

# ---- Conexion SQL Server ----
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=oscarcars;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:Oscarcars!2024}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ---- JPA / Hibernate ----
# El esquema lo gestionan los scripts de /database, no Hibernate.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ---- JWT ----
# Clave en Base64 (minimo 256 bits). En produccion debe venir por variable de entorno.
app.jwt.secret=${JWT_SECRET:Y2xhdmUtc2VjcmV0YS1hdXRvdHJhY2stbXV5LWxhcmdhLXBhcmEtaG1hYy1zaGEyNTYtMTIzNDU2}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ---- Servidor ----
server.port=${SERVER_PORT:8080}

# ---- CORS (origen del frontend) ----
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
