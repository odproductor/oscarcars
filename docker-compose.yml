services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: oscarcars-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Oscarcars!2024"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - oscarcars_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Crea la base 'oscarcars' y carga el esquema + datos demo una sola vez.
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: oscarcars-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "Oscarcars!2024"
    volumes:
      - ./database:/scripts:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -C -b \
          -i /scripts/01-schema.sql -i /scripts/02-seed.sql
        echo "Base de datos Prueba Oscar lista."

volumes:
  oscarcars_data:
